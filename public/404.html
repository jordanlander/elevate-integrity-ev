<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // SPA redirect for GitHub Pages — stores path/search/hash as structured JSON
      var l = window.location;
      try {
        sessionStorage.setItem('spa_redirect_v1', JSON.stringify({
          path: l.pathname,
          search: l.search,
          hash: l.hash,
          ts: Date.now()
        }));
      } catch (e) {}
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/'
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
